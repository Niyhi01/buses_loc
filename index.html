<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <title>Smart Shuttle — UNILORIN</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f5f5f5; }
    #map { width:100vw; height:100vh; }

    #no-buses-banner {
      display:none; position:fixed;
      top:16px; left:16px; right:16px;
      background:#e65100; color:white;
      padding:12px 16px; border-radius:10px;
      font-size:13px; z-index:1000; text-align:center;
    }

    #bus-card {
      display:none; position:fixed;
      bottom:0; left:0; right:0;
      background:white; border-radius:20px 20px 0 0;
      padding:20px;
      box-shadow:0 -4px 20px rgba(0,0,0,.2);
      z-index:1000; animation:slideUp .3s ease;
      max-height:90vh; overflow-y:auto;
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }
    .card-header {
      display:flex; justify-content:space-between;
      align-items:center; margin-bottom:4px;
    }
    .bus-name  { font-size:18px; font-weight:bold; color:#1B3A6B; }
    .close-btn {
      background:#eee; border:none; border-radius:50%;
      width:30px; height:30px; font-size:16px;
      cursor:pointer; line-height:30px; text-align:center;
    }
    .sub-label { color:#888; font-size:13px; margin-bottom:10px; }
    .info-row {
      display:flex; align-items:center;
      gap:10px; margin-bottom:12px;
    }
    .info-label { font-size:14px; color:#333; min-width:64px; }
    .badge {
      padding:5px 14px; border-radius:20px;
      color:white; font-weight:bold; font-size:13px;
    }
    .section-divider {
      border:none; border-top:1px solid #eee; margin:14px 0;
    }
    .section-title {
      font-size:13px; font-weight:bold; color:#888;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
    }
    #booking-confirmed {
      display:none; background:#E8F5E9; border-radius:12px;
      padding:16px; text-align:center; margin-bottom:12px;
    }
    #booking-confirmed .code-label {
      font-size:13px; color:#388E3C; margin-bottom:4px;
    }
    #booking-confirmed .booking-code {
      font-size:48px; font-weight:900;
      color:#1B5E20; letter-spacing:10px;
    }
    #booking-confirmed .code-hint {
      font-size:12px; color:#555; margin-top:6px;
    }
    .action-btn {
      width:100%; padding:14px; border:none;
      border-radius:12px; font-size:16px;
      font-weight:bold; color:white;
      cursor:pointer; transition:opacity .2s; margin-bottom:8px;
    }
    .action-btn:active { opacity:.8; }
    .action-btn:disabled { background:#9E9E9E !important; cursor:default; }
    .cancel-btn {
      width:100%; padding:10px; border:1.5px solid #F44336;
      border-radius:12px; font-size:14px; font-weight:bold;
      color:#F44336; background:#FFF; cursor:pointer;
    }
    #loading {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:white; padding:20px 30px;
      border-radius:12px; font-size:14px; color:#333;
      box-shadow:0 4px 12px rgba(0,0,0,.15); z-index:2000;
    }
  </style>
</head>
<body>

  <div id="loading">&#128260; Loading map...</div>
  <div id="map"></div>

  <div id="no-buses-banner">
    &#128652; No buses online right now. Operating hours: 6:30AM - 8:00PM
  </div>

  <div id="bus-card">
    <div class="card-header">
      <span class="bus-name" id="card-bus-type">CNG Bus</span>
      <button class="close-btn" onclick="closeCard()">X</button>
    </div>
    <div class="sub-label" id="card-driver">Driver: -</div>

    <div class="info-row">
      <span class="info-label">Seats:</span>
      <span class="badge" id="card-seats-badge">12 / 12</span>
    </div>
    <div class="info-row">
      <span class="info-label">&#9201; ETA:</span>
      <span id="card-eta" style="font-weight:bold;font-size:15px;">Calculating...</span>
    </div>
    <div class="info-row">
      <span class="info-label">&#128202; Queue:</span>
      <span id="card-queue" style="font-size:14px;color:#555;">Calculating...</span>
    </div>

    <hr class="section-divider" />
    <div class="section-title">Seat Reservation</div>

    <div id="booking-confirmed">
      <div class="code-label">Your Booking Code - show to driver</div>
      <div class="booking-code" id="display-code">----</div>
      <div class="code-hint">
        Valid for this trip only.<br>
        Driver types this code to confirm your seat.
      </div>
    </div>

    <button class="action-btn" id="book-btn"
            style="background:#1B3A6B;"
            onclick="bookSeat()">
      Book a Seat
    </button>

    <button class="cancel-btn" id="cancel-btn"
            style="display:none;"
            onclick="cancelBooking()">
      Cancel Booking
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
  // ================================================================
  // FIREBASE CONFIG
  // ================================================================
  const firebaseConfig = {
    apiKey:            "AIzaSyDRmrKcsfFzy0oiWDhn5vBBLW-V2-gWMZ4",
    authDomain:        "smart-campus-shuttle-tracker.firebaseapp.com",
    projectId:         "smart-campus-shuttle-tracker",
    storageBucket:     "smart-campus-shuttle-tracker.firebasestorage.app",
    messagingSenderId: "738720823079",
    appId:             "1:738720823079:web:f5c504cfb7054a7ad29b02"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ================================================================
  // COORDINATES - REPLACE THESE WHEN YOU VISIT CAMPUS
  //
  // How to get real coordinates:
  // 1. Open Google Maps on your phone
  // 2. Walk to the exact spot
  // 3. Long-press the location
  // 4. Copy the numbers that appear at the bottom
  // 5. Replace the values below
  //
  // GATE_PARK  = where students board buses (near main gate)
  // SCHOOL_PARK = where buses arrive inside campus
  // ================================================================
  // !! REPLACE THESE WITH REAL VALUES WHEN YOU VISIT CAMPUS !!
  // Current values are approximate UNILORIN area coordinates
  // Real UNILORIN campus is around 8.48N, 4.54E
  const GATE_PARK_LAT   = 8.4750;   // REPLACE - gate park area
  const GATE_PARK_LNG   = 4.5490;   // REPLACE - gate park area
  const SCHOOL_PARK_LAT = 8.4830;   // REPLACE - school park area
  const SCHOOL_PARK_LNG = 4.5520;   // REPLACE - school park area

  // ================================================================
  // MAP SETUP
  // ================================================================
  const map = L.map('map', {
    center: [GATE_PARK_LAT, GATE_PARK_LNG],
    zoom: 17,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  // Hide loading as soon as map is ready — do NOT wait for Firestore
  map.whenReady(function() {
    document.getElementById('loading').style.display = 'none';
  });

  // ── GATE PARK MARKER (departure point near main gate) ──
  const gateParkIcon = L.divIcon({
    html: '<div style="background:#E65100;color:white;padding:5px 10px;' +
          'border-radius:8px;font-size:11px;font-weight:bold;' +
          'white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);">' +
          '🚏 Gate Park</div>',
    className: '',
    iconAnchor: [45, 14]
  });
  L.marker([GATE_PARK_LAT, GATE_PARK_LNG], { icon: gateParkIcon }).addTo(map);

  // ── SCHOOL PARK MARKER (arrival point inside campus) ──
  const schoolParkIcon = L.divIcon({
    html: '<div style="background:#1B3A6B;color:white;padding:5px 10px;' +
          'border-radius:8px;font-size:11px;font-weight:bold;' +
          'white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);">' +
          '🏫 School Park</div>',
    className: '',
    iconAnchor: [50, 14]
  });
  L.marker([SCHOOL_PARK_LAT, SCHOOL_PARK_LNG], { icon: schoolParkIcon }).addTo(map);

  // ── ROUTE LINE connecting Gate Park to School Park ──
  // Shows students the shuttle route visually
  L.polyline(
    [[GATE_PARK_LAT, GATE_PARK_LNG], [SCHOOL_PARK_LAT, SCHOOL_PARK_LNG]],
    {
      color:     '#1B3A6B',
      weight:    4,
      opacity:   0.5,
      dashArray: '8, 8'   // dashed = approximate route, not exact road
    }
  ).addTo(map);

  // Centre map to show BOTH parks at once
  map.fitBounds([
    [GATE_PARK_LAT,   GATE_PARK_LNG],
    [SCHOOL_PARK_LAT, SCHOOL_PARK_LNG]
  ], { padding: [40, 40] });

  // ================================================================
  // STATE
  // ================================================================
  const busMarkers    = {};
  let selectedBus     = null;
  let activeBookingId   = null;
  let activeBookingCode = null;
  let activeBusCount  = 0;
  let fleetAvgSeats   = 12;
  let campusConfig    = { base_headway: 15, special_event_factor: 0.0 };

  // ================================================================
  // HAVERSINE DISTANCE (km)
  // ================================================================
  function haversineKm(lat1, lng1, lat2, lng2) {
    const R    = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a    = Math.sin(dLat/2) * Math.sin(dLat/2)
               + Math.cos(lat1 * Math.PI / 180)
               * Math.cos(lat2 * Math.PI / 180)
               * Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ================================================================
  // GPS-BASED ETA — direction-aware
  //
  // Reads the 'direction' field set by the driver:
  //   'to_school' = bus heading from Gate Park → School Park
  //   'to_gate'   = bus heading from School Park → Gate Park
  //
  // Also detects when bus is physically AT a park (within 80 metres)
  // and shows that status instead of an ETA number.
  //
  // Average campus bus speed: 20 km/h
  // ================================================================

  // 80 metres threshold for "at park" detection
  var AT_PARK_THRESHOLD_KM = 0.08;

  function calculateETA(busLat, busLng, direction) {
    var distToGate   = haversineKm(busLat, busLng, GATE_PARK_LAT,   GATE_PARK_LNG);
    var distToSchool = haversineKm(busLat, busLng, SCHOOL_PARK_LAT, SCHOOL_PARK_LNG);

    // ── Check if bus is currently AT either park ──────────────────
    if (distToGate <= AT_PARK_THRESHOLD_KM) {
      return '🟢 Currently at Gate Park';
    }
    if (distToSchool <= AT_PARK_THRESHOLD_KM) {
      return '🟢 Currently at School Park';
    }

    // ── Use driver-set direction to find destination ──────────────
    // direction field comes from Firestore, set by driver on trip start
    var headingToSchool = (direction === 'to_school');
    var destination     = headingToSchool ? 'School Park' : 'Gate Park';
    var distKm          = headingToSchool ? distToSchool  : distToGate;

    // Fallback if direction field is missing from old documents
    if (!direction || direction === '') {
      // Best guess from position only — warn in label
      headingToSchool = distToGate < distToSchool;
      destination     = headingToSchool ? 'School Park' : 'Gate Park';
      distKm          = headingToSchool ? distToSchool  : distToGate;
    }

    var etaMins = (distKm / 20) * 60;

    if (etaMins < 1)  return '🟢 Arriving at ' + destination;
    if (etaMins > 60) return '🔴 Over 1 hour to ' + destination;

    var mins = Math.round(etaMins);
    var dot  = mins <= 5 ? '🟢' : mins <= 15 ? '🟡' : '🔴';
    return dot + ' ~' + mins + ' min' + (mins === 1 ? '' : 's') + ' to ' + destination;
  }

  // ================================================================
  // QUEUE PRESSURE — PWT EQUATION FROM SEMINAR REPORT
  // System-level indicator, not personal ETA
  // ================================================================
  function calculateQueuePressure() {
    const now  = new Date();
    const time = now.getHours() + now.getMinutes() / 60;

    let pf;
    if      (time >= 6.5  && time <= 10.0) pf = 2.0;
    else if (time >= 13.5 && time <= 16.5) pf = 1.8;
    else if (time >= 17.0 && time <= 19.0) pf = 1.3;
    else pf = 1.0;

    let ts;
    if ((time >= 7.75  && time <= 8.25)  ||
        (time >= 9.75  && time <= 10.25) ||
        (time >= 11.75 && time <= 12.25) ||
        (time >= 13.75 && time <= 14.25) ||
        (time >= 15.75 && time <= 16.25)) { ts = 0.5; }
    else if (pf >= 1.8) { ts = 0.3; }
    else                { ts = 0.0; }

    const bh = campusConfig.base_headway        || 15;
    const se = campusConfig.special_event_factor || 0.0;
    const um = 0.35;
    const af = 0.0;

    if (activeBusCount <= 0 || fleetAvgSeats <= 0) return 'No buses online';

    const pwt  = (bh * pf * (1 + ts + um + se + af)) / (activeBusCount * fleetAvgSeats);
    const mins = Math.round(pwt);

    if (pwt < 1)   return 'Low - short queue expected';
    if (pwt > 120) return 'Very high - very long queue';
    if (mins <= 10) return 'Low (~' + mins + ' min queue)';
    if (mins <= 25) return 'Moderate (~' + mins + ' min queue)';
    return 'High (~' + mins + ' min queue)';
  }

  // ================================================================
  // BUS MARKER ICON
  // ================================================================
  function getBusIcon(busType, seats) {
    const color = seats > 0 ? '#4CAF50' : '#F44336';
    const label = busType === 'Tricycle' ? 'Tricycle' : 'Bus';
    return L.divIcon({
      html: '<div style="background:' + color + ';border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:36px;height:36px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px;color:white;font-weight:bold;">' + label.charAt(0) + '</span></div><div style="background:' + color + ';color:white;border-radius:10px;padding:2px 6px;font-size:10px;font-weight:bold;text-align:center;margin-top:2px;white-space:nowrap;">' + (seats > 0 ? seats + ' seats' : 'FULL') + '</div>',
      className: '',
      iconSize:   [44, 56],
      iconAnchor: [22, 56]
    });
  }

  // ================================================================
  // LOAD CAMPUS CONFIG
  // ================================================================
  db.collection('campuses')
    .where('campus_id', '==', 'UNILORIN_MAIN')
    .get()
    .then(function(snap) {
      if (!snap.empty) {
        var d = snap.docs[0].data();
        campusConfig.base_headway        = d.base_headway        || 15;
        campusConfig.special_event_factor = d.special_event_factor || 0.0;
        if (d.center_location) {
          map.setView([d.center_location.latitude, d.center_location.longitude], 17);
        }
      }
    })
    .catch(function(err) {
      console.warn('Campus config failed:', err);
    });

  // ================================================================
  // REAL-TIME BUS LISTENER
  // ================================================================
  db.collection('buses')
    .where('status', '==', 'Active')
    .onSnapshot(function(snapshot) {

      activeBusCount = snapshot.docs.length;

      var totalSeats = 0;
      snapshot.docs.forEach(function(doc) {
        totalSeats += (doc.data().max_capacity || 12);
      });
      fleetAvgSeats = activeBusCount > 0 ? Math.round(totalSeats / activeBusCount) : 12;

      var seenIds = new Set();

      snapshot.docs.forEach(function(doc) {
        var d      = doc.data();
        var docId  = doc.id;
        var lat    = d.location ? d.location.latitude  : (d.latitude  || 0);
        var lng    = d.location ? d.location.longitude : (d.longitude || 0);
        var seats  = d.available_seats || 0;
        var maxCap = d.max_capacity    || 12;
        var type   = d.bus_type        || 'CNG Bus';
        var driver = d.driver_name     || 'Unknown';
        var busId  = d.bus_id          || docId;

        seenIds.add(docId);
        if (lat === 0 && lng === 0) return;

        var icon    = getBusIcon(type, seats);
        var direction = d.direction || '';  // 'to_school' or 'to_gate'
        var busData = { docId:docId, busId:busId, type:type, driver:driver,
                        seats:seats, maxCap:maxCap, lat:lat, lng:lng,
                        direction:direction };

        if (busMarkers[docId]) {
          busMarkers[docId].setLatLng([lat, lng]);
          busMarkers[docId].setIcon(icon);
          busMarkers[docId]._busData = busData;
        } else {
          var marker = L.marker([lat, lng], { icon: icon }).addTo(map);
          marker._busData = busData;
          marker.on('click', function() { showCard(this._busData); });
          busMarkers[docId] = marker;
        }
      });

      Object.keys(busMarkers).forEach(function(id) {
        if (!seenIds.has(id)) {
          map.removeLayer(busMarkers[id]);
          delete busMarkers[id];
        }
      });

      document.getElementById('no-buses-banner').style.display =
        activeBusCount === 0 ? 'block' : 'none';

      if (selectedBus) {
        var m = busMarkers[selectedBus.docId];
        if (m) showCard(m._busData); else closeCard();
      }

    }, function(err) { console.error('Firestore error:', err); });

  // ================================================================
  // SHOW BUS CARD
  // ================================================================
  function showCard(busData) {
    selectedBus = busData;

    document.getElementById('card-bus-type').textContent = busData.type;
    document.getElementById('card-driver').textContent   = 'Driver: ' + busData.driver;

    var badge = document.getElementById('card-seats-badge');
    badge.textContent      = busData.seats + ' / ' + busData.maxCap + ' available';
    badge.style.background = busData.seats > 0 ? '#4CAF50' : '#F44336';

    document.getElementById('card-eta').textContent   = calculateETA(busData.lat, busData.lng, busData.direction);
    document.getElementById('card-queue').textContent = calculateQueuePressure();

    if (activeBookingId && activeBookingCode) {
      showBookingConfirmed();
    } else {
      showBookButton(busData.seats);
    }

    document.getElementById('bus-card').style.display = 'block';
  }

  function showBookButton(seats) {
    document.getElementById('booking-confirmed').style.display = 'none';
    document.getElementById('cancel-btn').style.display        = 'none';
    var btn = document.getElementById('book-btn');
    btn.style.display = 'block';
    if (seats > 0) {
      btn.textContent      = 'Book a Seat';
      btn.style.background = '#1B3A6B';
      btn.disabled         = false;
    } else {
      btn.textContent      = 'Bus is Full';
      btn.style.background = '#9E9E9E';
      btn.disabled         = true;
    }
  }

  function showBookingConfirmed() {
    document.getElementById('book-btn').style.display          = 'none';
    document.getElementById('display-code').textContent        = activeBookingCode;
    document.getElementById('booking-confirmed').style.display = 'block';
    document.getElementById('cancel-btn').style.display        = 'block';
  }

  function closeCard() {
    document.getElementById('bus-card').style.display = 'none';
  }
  map.on('click', closeCard);

  // ================================================================
  // GENERATE 4-CHARACTER BOOKING CODE
  // No confusing characters (0, O, 1, I,
