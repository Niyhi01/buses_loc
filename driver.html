<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Driver Panel — Smart Shuttle</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#F5F5F5; min-height:100vh; }

    /* HEADER */
    .header {
      background:#1B3A6B; color:white;
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .header h1 { font-size:16px; font-weight:bold; }
    .trip-badge {
      padding:4px 12px; border-radius:20px;
      font-size:12px; font-weight:bold;
    }
    .trip-badge.online  { background:#4CAF50; }
    .trip-badge.offline { background:rgba(255,255,255,.2); }

    .content { padding:16px; max-width:500px; margin:0 auto; }

    /* CARDS */
    .card {
      background:white; border-radius:14px;
      padding:18px; margin-bottom:14px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .card-title {
      font-size:11px; color:#888;
      text-transform:uppercase; letter-spacing:.6px;
      margin-bottom:12px; font-weight:bold;
    }

    /* BUS SELECTOR */
    .bus-select {
      width:100%; padding:12px 14px;
      border:2px solid #E0E0E0; border-radius:10px;
      font-size:15px; color:#333;
      background:white; outline:none;
      appearance:none; cursor:pointer;
      transition:border-color .2s;
    }
    .bus-select:focus { border-color:#1B3A6B; }

    /* DIRECTION TOGGLE */
    .direction-row {
      display:flex; gap:10px; margin-top:4px;
    }
    .dir-btn {
      flex:1; padding:11px 8px;
      border:2px solid #E0E0E0; border-radius:10px;
      font-size:13px; font-weight:bold;
      background:white; color:#555;
      cursor:pointer; transition:all .2s;
      text-align:center;
    }
    .dir-btn.selected {
      border-color:#1B3A6B;
      background:#1B3A6B; color:white;
    }
    .dir-btn:disabled { opacity:.4; cursor:default; }

    /* TRIP BUTTON */
    .trip-btn {
      width:100%; padding:15px;
      border:none; border-radius:12px;
      font-size:17px; font-weight:bold;
      color:white; cursor:pointer;
      transition:opacity .2s, transform .1s;
    }
    .trip-btn:active   { transform:scale(.97); }
    .trip-btn:disabled { opacity:.45; cursor:default; }
    .trip-btn.start    { background:#2E7D32; }
    .trip-btn.stop     { background:#C62828; }

    /* GPS STATUS */
    .gps-status {
      display:none;
      align-items:center; gap:8px;
      padding:10px 14px; border-radius:10px;
      background:#E8F5E9; margin-top:10px;
      font-size:13px; color:#2E7D32; font-weight:bold;
    }
    .gps-dot {
      width:10px; height:10px; border-radius:50%;
      background:#4CAF50;
      animation:pulse 1.5s infinite;
      flex-shrink:0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.3); }
    }

    /* SEAT COUNTER */
    .seat-counter {
      display:flex; align-items:center;
      justify-content:center; gap:20px;
      margin:8px 0 6px;
    }
    .counter-btn {
      width:56px; height:56px; border-radius:50%;
      border:none; font-size:28px; font-weight:bold;
      cursor:pointer; transition:transform .1s, opacity .2s;
      display:flex; align-items:center; justify-content:center;
    }
    .counter-btn:active   { transform:scale(.9); }
    .counter-btn:disabled { opacity:.3; cursor:default; }
    .minus-btn { background:#FFEBEE; color:#C62828; }
    .plus-btn  { background:#E8F5E9; color:#2E7D32; }
    .seat-number {
      font-size:60px; font-weight:900;
      color:#1B3A6B; line-height:1; min-width:80px;
      text-align:center;
    }
    .seat-fraction { text-align:center; color:#888; font-size:13px; margin-top:4px; }
    .seat-hint { text-align:center; color:#aaa; font-size:11px;
                 margin-top:6px; font-style:italic; }

    /* CODE VERIFIER */
    .code-row { display:flex; gap:10px; }
    .code-input {
      flex:1; padding:13px 14px;
      border:2px solid #E0E0E0; border-radius:10px;
      font-size:22px; font-weight:bold;
      letter-spacing:6px; text-align:center;
      text-transform:uppercase; outline:none;
      background:#FAFAFA; transition:border-color .2s;
    }
    .code-input:focus { border-color:#1B3A6B; background:white; }
    .verify-btn {
      padding:13px 18px; background:#1B3A6B;
      color:white; border:none; border-radius:10px;
      font-size:15px; font-weight:bold;
      cursor:pointer; transition:opacity .2s; white-space:nowrap;
    }
    .verify-btn:disabled { opacity:.45; cursor:default; }
    .verify-btn:active   { opacity:.8; }

    .result-box {
      display:none; margin-top:10px;
      padding:13px 14px; border-radius:10px;
      font-size:14px; font-weight:bold;
    }
    .result-box.ok  { background:#E8F5E9; color:#1B5E20; border:1px solid #A5D6A7; }
    .result-box.err { background:#FFEBEE; color:#B71C1C; border:1px solid #EF9A9A; }
    .result-detail  { font-size:12px; font-weight:normal; margin-top:3px; opacity:.8; }

    /* LOADING / STATES */
    #init-loading {
      text-align:center; padding:60px 20px; color:#888;
    }
    .error-card {
      background:#FFEBEE; border-radius:12px;
      padding:16px; color:#B71C1C; font-size:14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚌 Driver Dashboard</h1>
    <span class="trip-badge offline" id="trip-badge">OFFLINE</span>
  </div>

  <div class="content">

    <div id="init-loading">
      <div style="font-size:36px;margin-bottom:12px;">⏳</div>
      <p>Loading buses from Firebase...</p>
    </div>

    <div id="main-content" style="display:none;">

      <!-- ── BUS & DIRECTION ── -->
      <div class="card">
        <div class="card-title">1. Select Your Bus</div>
        <select class="bus-select" id="bus-select"
                onchange="onBusChange()" disabled>
          <option value="">Loading buses...</option>
        </select>

        <div class="card-title" style="margin-top:16px;">
          2. Select Direction
        </div>
        <div class="direction-row">
          <button class="dir-btn" id="dir-school"
                  onclick="setDirection('to_school')" disabled>
            → To School Park
          </button>
          <button class="dir-btn" id="dir-gate"
                  onclick="setDirection('to_gate')" disabled>
            ← To Gate Park
          </button>
        </div>
      </div>

      <!-- ── TRIP CONTROL ── -->
      <div class="card">
        <div class="card-title">3. Trip Control</div>

        <button class="trip-btn start" id="start-btn"
                onclick="startTrip()" disabled>
          🚦 START TRIP
        </button>
        <button class="trip-btn stop" id="stop-btn"
                onclick="stopTrip()" style="display:none;">
          ⛔ STOP TRIP
        </button>

        <!-- Live GPS pulse indicator -->
        <div class="gps-status" id="gps-status">
          <div class="gps-dot"></div>
          <span id="gps-text">GPS sending...</span>
        </div>
      </div>

      <!-- ── SEAT COUNTER ── -->
      <div class="card" id="seat-card">
        <div class="card-title">Seat Count</div>
        <div class="seat-counter">
          <button class="counter-btn minus-btn"
                  id="minus-btn" onclick="decrementSeat()">−</button>
          <div>
            <div class="seat-number" id="seat-number">—</div>
          </div>
          <button class="counter-btn plus-btn"
                  id="plus-btn" onclick="incrementSeat()">+</button>
        </div>
        <div class="seat-fraction" id="seat-fraction">Select a bus first</div>
        <div class="seat-hint">
          Adjust manually for cash passengers who board without booking
        </div>
      </div>

      <!-- ── CODE VERIFIER ── -->
      <div class="card">
        <div class="card-title">Verify Passenger Booking Code</div>
        <div class="code-row">
          <input type="text" class="code-input" id="code-input"
                 maxlength="4" placeholder="CODE"
                 oninput="onCodeInput(this)" />
          <button class="verify-btn" id="verify-btn"
                  onclick="verifyCode()" disabled>
            Verify
          </button>
        </div>
        <div class="result-box" id="result-box">
          <div id="result-text"></div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>

    </div><!-- /main-content -->
  </div><!-- /content -->

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
  // ══════════════════════════════════════════════════════════
  // FIREBASE CONFIG
  // ══════════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey:            "AIzaSyDRmrKcsfFzy0oiWDhn5vBBLW-V2-gWMZ4",
    authDomain:        "smart-campus-shuttle-tracker.firebaseapp.com",
    projectId:         "smart-campus-shuttle-tracker",
    storageBucket:     "smart-campus-shuttle-tracker.firebasestorage.app",
    messagingSenderId: "738720823079",
    appId:             "1:738720823079:web:f5c504cfb7054a7ad29b02"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ══════════════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════════════
  var selectedBusId   = '';
  var selectedDir     = '';
  var isTracking      = false;
  var gpsIntervalId   = null;
  var busListener     = null;
  var currentBusData  = null;
  var allBusOptions   = []; // [{id, label}]

  // ══════════════════════════════════════════════════════════
  // LOAD ALL BUSES FROM FIRESTORE INTO DROPDOWN
  // ══════════════════════════════════════════════════════════
  function loadBuses() {
    db.collection('buses').get()
      .then(function(snap) {
        document.getElementById('init-loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';

        var select = document.getElementById('bus-select');
        select.innerHTML = '<option value="">— Select your bus —</option>';

        if (snap.empty) {
          select.innerHTML = '<option value="">No buses found in database</option>';
          return;
        }

        snap.docs.forEach(function(doc) {
          var d     = doc.data();
          var label = (d.bus_type || 'Bus') + ' — ' + (d.driver_name || doc.id);
          var opt   = document.createElement('option');
          opt.value       = doc.id;
          opt.textContent = label;
          select.appendChild(opt);
          allBusOptions.push({ id: doc.id, label: label });
        });

        select.disabled = false;
      })
      .catch(function(err) {
        document.getElementById('init-loading').innerHTML =
          '<div class="error-card">Failed to load buses: ' + err.message + '</div>';
      });
  }

  // ══════════════════════════════════════════════════════════
  // BUS SELECTION CHANGED
  // ══════════════════════════════════════════════════════════
  function onBusChange() {
    var newId = document.getElementById('bus-select').value;

    // Stop any existing bus listener
    if (busListener) { busListener(); busListener = null; }

    // Reset seat display
    document.getElementById('seat-number').textContent   = '—';
    document.getElementById('seat-fraction').textContent = 'Loading...';
    document.getElementById('minus-btn').disabled = true;
    document.getElementById('plus-btn').disabled  = true;

    if (!newId) {
      selectedBusId = '';
      updateDirectionButtons();
      updateStartButton();
      return;
    }

    selectedBusId = newId;

    // Start real-time listener on selected bus document
    busListener = db.collection('buses').doc(selectedBusId)
      .onSnapshot(function(doc) {
        if (!doc.exists) return;
        currentBusData = doc.data();

        var seats  = currentBusData.available_seats !== undefined
                   ? currentBusData.available_seats : 0;
        var maxCap = currentBusData.max_capacity || 12;

        // Update seat display — live from Firestore
        var el = document.getElementById('seat-number');
        el.textContent  = seats;
        el.style.color  = seats === 0 ? '#C62828'
                        : seats <= 3  ? '#E65100' : '#1B3A6B';

        document.getElementById('seat-fraction').textContent =
          seats + ' / ' + maxCap + ' seats available';

        // Button guards
        document.getElementById('minus-btn').disabled =
          seats <= 0 || !isTracking;
        document.getElementById('plus-btn').disabled  =
          seats >= maxCap || !isTracking;
      });

    updateDirectionButtons();
    updateStartButton();
  }

  // ══════════════════════════════════════════════════════════
  // DIRECTION SELECTION
  // ══════════════════════════════════════════════════════════
  function setDirection(dir) {
    if (isTracking) return; // can't change direction mid-trip
    selectedDir = dir;
    document.getElementById('dir-school').classList
      .toggle('selected', dir === 'to_school');
    document.getElementById('dir-gate').classList
      .toggle('selected', dir === 'to_gate');
    updateStartButton();
  }

  function updateDirectionButtons() {
    var hasBus = !!selectedBusId;
    document.getElementById('dir-school').disabled = !hasBus || isTracking;
    document.getElementById('dir-gate').disabled   = !hasBus || isTracking;
  }

  function updateStartButton() {
    var ready = selectedBusId && selectedDir && !isTracking;
    document.getElementById('start-btn').disabled = !ready;
  }

  // ══════════════════════════════════════════════════════════
  // START TRIP — request GPS permission + begin interval
  // ══════════════════════════════════════════════════════════
  function startTrip() {
    if (!selectedBusId || !selectedDir) return;

    // First check geolocation is available
    if (!navigator.geolocation) {
      alert('GPS is not available in this browser. Please use Chrome on Android.');
      return;
    }

    // Request permission by getting position once
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        // Permission granted — go online
        isTracking = true;
        setTripUI(true);

        // Write first GPS point immediately
        sendGPS(pos);

        // Then send every 10 seconds
        gpsIntervalId = setInterval(function() {
          navigator.geolocation.getCurrentPosition(
            sendGPS,
            function(err) {
              document.getElementById('gps-text').textContent =
                'GPS error: ' + err.message;
            },
            { enableHighAccuracy: true, timeout: 8000 }
          );
        }, 10000);
      },
      function(err) {
        if (err.code === 1) {
          alert('Location permission denied. Please allow location access and try again.');
        } else {
          alert('GPS error: ' + err.message);
        }
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  // ══════════════════════════════════════════════════════════
  // SEND GPS TO FIRESTORE
  // ══════════════════════════════════════════════════════════
  function sendGPS(position) {
    var lat = position.coords.latitude;
    var lng = position.coords.longitude;
    var now = new Date();
    var timeStr = now.getHours() + ':' +
                  String(now.getMinutes()).padStart(2,'0') + ':' +
                  String(now.getSeconds()).padStart(2,'0');

    db.collection('buses').doc(selectedBusId).update({
      latitude:   lat,
      longitude:  lng,
      location:   new firebase.firestore.GeoPoint(lat, lng),
      status:     'Active',
      direction:  selectedDir,
      last_updated: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      document.getElementById('gps-text').textContent =
        'GPS live — last sync: ' + timeStr;
    }).catch(function(err) {
      document.getElementById('gps-text').textContent =
        'Sync failed: ' + err.message;
    });
  }

  // ══════════════════════════════════════════════════════════
  // STOP TRIP
  // ══════════════════════════════════════════════════════════
  function stopTrip() {
    if (gpsIntervalId) {
      clearInterval(gpsIntervalId);
      gpsIntervalId = null;
    }

    isTracking  = false;
    selectedDir = '';

    db.collection('buses').doc(selectedBusId).update({
      status: 'Offline'
    }).catch(function(){});

    setTripUI(false);

    // Reset direction buttons
    document.getElementById('dir-school').classList.remove('selected');
    document.getElementById('dir-gate').classList.remove('selected');
    updateDirectionButtons();
    updateStartButton();
  }

  // ══════════════════════════════════════════════════════════
  // UPDATE UI FOR TRIP STATE
  // ══════════════════════════════════════════════════════════
  function setTripUI(online) {
    document.getElementById('start-btn').style.display =
      online ? 'none'  : 'block';
    document.getElementById('stop-btn').style.display  =
      online ? 'block' : 'none';
    document.getElementById('gps-status').style.display =
      online ? 'flex'  : 'none';

    // Trip badge in header
    var badge = document.getElementById('trip-badge');
    badge.textContent = online ? 'ONLINE' : 'OFFLINE';
    badge.className   = 'trip-badge ' + (online ? 'online' : 'offline');

    // Bus select and direction locked during trip
    document.getElementById('bus-select').disabled   = online;
    document.getElementById('dir-school').disabled   = online;
    document.getElementById('dir-gate').disabled     = online;

    // Seat buttons — only usable during trip
    if (currentBusData) {
      var seats  = currentBusData.available_seats || 0;
      var maxCap = currentBusData.max_capacity    || 12;
      document.getElementById('minus-btn').disabled = !online || seats <= 0;
      document.getElementById('plus-btn').disabled  = !online || seats >= maxCap;
    }
  }

  // ══════════════════════════════════════════════════════════
  // SEAT INCREMENT / DECREMENT
  // Writes to Firestore — onSnapshot updates the number live
  // ══════════════════════════════════════════════════════════
  function incrementSeat() {
    if (!currentBusData || !selectedBusId) return;
    var seats  = currentBusData.available_seats || 0;
    var maxCap = currentBusData.max_capacity    || 12;
    if (seats >= maxCap) return;
    db.collection('buses').doc(selectedBusId).update({
      available_seats: firebase.firestore.FieldValue.increment(1)
    }).catch(function(e){ alert('Update failed: '+e.message); });
  }

  function decrementSeat() {
    if (!currentBusData || !selectedBusId) return;
    var seats = currentBusData.available_seats || 0;
    if (seats <= 0) return;
    db.collection('buses').doc(selectedBusId).update({
      available_seats: firebase.firestore.FieldValue.increment(-1)
    }).catch(function(e){ alert('Update failed: '+e.message); });
  }

  // ══════════════════════════════════════════════════════════
  // CODE VERIFIER
  // ══════════════════════════════════════════════════════════
  function onCodeInput(input) {
    input.value = input.value.toUpperCase();
    document.getElementById('verify-btn').disabled = input.value.length < 4;
    hideResult();
  }

  function verifyCode() {
    var code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length !== 4 || !selectedBusId) return;

    var btn = document.getElementById('verify-btn');
    btn.disabled    = true;
    btn.textContent = '...';

    db.collection('reservations')
      .where('booking_code',    '==', code)
      .where('status',          '==', 'Booked')
      .where('bus_document_id', '==', selectedBusId)
      .get()
      .then(function(snap) {
        btn.disabled    = false;
        btn.textContent = 'Verify';

        if (snap.empty) {
          // Check if code exists but wrong bus
          db.collection('reservations')
            .where('booking_code', '==', code)
            .get()
            .then(function(anySnap) {
              if (anySnap.empty) {
                showResult(false, '❌ Invalid Code',
                  'Code "'+code+'" not found. Check for typos.');
              } else {
                var status = anySnap.docs[0].data().status;
                if (status === 'Completed') {
                  showResult(false, '⚠️ Already Used',
                    'This ticket was already scanned and used.');
                } else if (status === 'Cancelled') {
                  showResult(false, '⚠️ Cancelled',
                    'This booking was cancelled by the passenger.');
                } else {
                  showResult(false, '❌ Wrong Bus',
                    'This code is valid but for a different bus.');
                }
              }
            });
          return;
        }

        // Valid — mark Completed
        snap.docs[0].ref.update({ status: 'Completed' })
          .then(function() {
            showResult(true, '✅ Access Granted',
              'Passenger may board. Ticket marked as completed.');
            document.getElementById('code-input').value = '';
            document.getElementById('verify-btn').disabled = true;
            setTimeout(hideResult, 5000);
          });
      })
      .catch(function(err) {
        btn.disabled    = false;
        btn.textContent = 'Verify';
        showResult(false, '❌ Error', err.message);
      });
  }

  function showResult(ok, text, detail) {
    var box = document.getElementById('result-box');
    box.className = 'result-box ' + (ok ? 'ok' : 'err');
    document.getElementById('result-text').textContent   = text;
    document.getElementById('result-detail').textContent = detail || '';
    box.style.display = 'block';
  }
  function hideResult() {
    document.getElementById('result-box').style.display = 'none';
  }

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════
  loadBuses();
  </script>
</body>
</html>
