<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <title>Driver Panel — Smart Shuttle</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif;
      background:#F5F5F5;
      min-height:100vh;
    }

    /* ── HEADER ── */
    .header {
      background:#1B3A6B;
      color:white;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:100;
    }
    .header h1 { font-size:17px; font-weight:bold; }
    .header .bus-badge {
      background:rgba(255,255,255,0.2);
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
    }

    /* ── CONTENT ── */
    .content { padding:20px; max-width:500px; margin:0 auto; }

    /* ── STATUS CARD ── */
    .status-card {
      background:white;
      border-radius:14px;
      padding:20px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .status-card .label {
      font-size:12px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:4px;
    }
    .status-card .bus-name {
      font-size:22px;
      font-weight:bold;
      color:#1B3A6B;
      margin-bottom:8px;
    }
    .status-row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .status-pill {
      padding:5px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
      color:white;
    }

    /* ── SEAT COUNTER ── */
    .seat-card {
      background:white;
      border-radius:14px;
      padding:20px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      text-align:center;
    }
    .seat-card .section-title {
      font-size:12px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:16px;
      text-align:left;
    }
    .seat-counter {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      margin-bottom:12px;
    }
    .counter-btn {
      width:56px;
      height:56px;
      border-radius:50%;
      border:none;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
      transition:transform .1s, opacity .2s;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .counter-btn:active { transform:scale(.92); }
    .counter-btn:disabled { opacity:.35; cursor:default; }
    .minus-btn { background:#FFEBEE; color:#C62828; }
    .plus-btn  { background:#E8F5E9; color:#2E7D32; }
    .seat-number {
      font-size:64px;
      font-weight:900;
      color:#1B3A6B;
      line-height:1;
      min-width:80px;
    }
    .seat-fraction {
      font-size:14px;
      color:#888;
      margin-top:4px;
    }
    .cash-hint {
      font-size:12px;
      color:#888;
      margin-top:8px;
      font-style:italic;
    }

    /* ── CODE VERIFIER ── */
    .verify-card {
      background:white;
      border-radius:14px;
      padding:20px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .verify-card .section-title {
      font-size:12px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:14px;
    }
    .code-input-row {
      display:flex;
      gap:10px;
    }
    .code-input {
      flex:1;
      padding:14px 16px;
      border:2px solid #E0E0E0;
      border-radius:10px;
      font-size:22px;
      font-weight:bold;
      letter-spacing:6px;
      text-align:center;
      text-transform:uppercase;
      outline:none;
      transition:border-color .2s;
      background:#FAFAFA;
    }
    .code-input:focus { border-color:#1B3A6B; background:white; }
    .verify-btn {
      padding:14px 20px;
      background:#1B3A6B;
      color:white;
      border:none;
      border-radius:10px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:opacity .2s;
      white-space:nowrap;
    }
    .verify-btn:active  { opacity:.8; }
    .verify-btn:disabled { opacity:.5; cursor:default; }

    /* Result box */
    .result-box {
      display:none;
      margin-top:12px;
      padding:14px 16px;
      border-radius:10px;
      font-size:15px;
      font-weight:bold;
    }
    .result-box.success {
      background:#E8F5E9;
      color:#1B5E20;
      border:1px solid #A5D6A7;
    }
    .result-box.error {
      background:#FFEBEE;
      color:#B71C1C;
      border:1px solid #EF9A9A;
    }
    .result-box .result-detail {
      font-size:12px;
      font-weight:normal;
      margin-top:4px;
      opacity:.8;
    }

    /* ── NO BUS SELECTED STATE ── */
    #no-bus-state {
      text-align:center;
      padding:60px 20px;
      color:#888;
    }
    #no-bus-state .icon { font-size:48px; margin-bottom:16px; }
    #no-bus-state p { font-size:15px; }

    /* ── LOADING ── */
    #loading-state {
      text-align:center;
      padding:60px 20px;
      color:#888;
    }

    /* ── ERROR STATE ── */
    .error-state {
      background:#FFEBEE;
      border-radius:12px;
      padding:16px;
      color:#B71C1C;
      font-size:14px;
      margin-bottom:16px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚌 Driver Seat Manager</h1>
    <span class="bus-badge" id="header-bus-name">No bus selected</span>
  </div>

  <div class="content">

    <div id="loading-state">
      <div style="font-size:32px;margin-bottom:12px;">⏳</div>
      <p>Loading bus data...</p>
    </div>

    <div id="no-bus-state" style="display:none;">
      <div class="icon">🚌</div>
      <p>No bus ID provided.<br>Please open this page from the Driver Dashboard.</p>
    </div>

    <div id="main-content" style="display:none;">

      <!-- Bus Status Card -->
      <div class="status-card">
        <div class="label">Currently Managing</div>
        <div class="bus-name" id="bus-display-name">—</div>
        <div class="status-row">
          <span class="status-pill" id="status-pill"
                style="background:#9E9E9E;">Offline</span>
          <span class="status-pill" id="direction-pill"
                style="background:#1565C0;">—</span>
        </div>
      </div>

      <!-- Seat Counter Card -->
      <div class="seat-card">
        <div class="section-title">Available Seats</div>

        <div class="seat-counter">
          <button class="counter-btn minus-btn"
                  id="minus-btn" onclick="decrementSeat()">−</button>
          <div>
            <div class="seat-number" id="seat-count">—</div>
          </div>
          <button class="counter-btn plus-btn"
                  id="plus-btn" onclick="incrementSeat()">+</button>
        </div>

        <div class="seat-fraction" id="seat-fraction">— / — seats</div>
        <div class="cash-hint">
          Use + / − to adjust for cash passengers who board without booking
        </div>
      </div>

      <!-- Code Verifier Card -->
      <div class="verify-card">
        <div class="section-title">Verify Passenger Booking Code</div>

        <div class="code-input-row">
          <input
            type="text"
            class="code-input"
            id="code-input"
            maxlength="4"
            placeholder="CODE"
            oninput="onCodeInput(this)"
          />
          <button class="verify-btn" id="verify-btn"
                  onclick="verifyCode()" disabled>
            Verify
          </button>
        </div>

        <div class="result-box" id="result-box">
          <div id="result-text">—</div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>

    </div><!-- /main-content -->
  </div><!-- /content -->

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
  // ════════════════════════════════════════════════════════════
  // FIREBASE CONFIG
  // ════════════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey:            "AIzaSyDRmrKcsfFzy0oiWDhn5vBBLW-V2-gWMZ4",
    authDomain:        "smart-campus-shuttle-tracker.firebaseapp.com",
    projectId:         "smart-campus-shuttle-tracker",
    storageBucket:     "smart-campus-shuttle-tracker.firebasestorage.app",
    messagingSenderId: "738720823079",
    appId:             "1:738720823079:web:f5c504cfb7054a7ad29b02"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ════════════════════════════════════════════════════════════
  // READ BUS ID FROM URL PARAMETER
  // FlutterFlow WebView opens: driver.html?busId=bus_1
  // ════════════════════════════════════════════════════════════
  const params    = new URLSearchParams(window.location.search);
  const busId     = params.get('busId') || '';
  let   currentBusData = null;
  let   busListener    = null; // store unsubscribe function

  // ════════════════════════════════════════════════════════════
  // INITIALISE
  // ════════════════════════════════════════════════════════════
  function init() {
    if (!busId) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('no-bus-state').style.display  = 'block';
      return;
    }
    startBusListener();
  }

  // ════════════════════════════════════════════════════════════
  // REAL-TIME LISTENER ON SELECTED BUS DOCUMENT
  // Updates UI instantly whenever Firestore changes
  // ════════════════════════════════════════════════════════════
  function startBusListener() {
    // Unsubscribe any existing listener first
    if (busListener) busListener();

    busListener = db.collection('buses').doc(busId)
      .onSnapshot(function(doc) {
        document.getElementById('loading-state').style.display = 'none';

        if (!doc.exists) {
          showError('Bus document "' + busId + '" not found in Firestore.');
          return;
        }

        const d = doc.data();
        currentBusData = d;

        // Show main content
        document.getElementById('main-content').style.display = 'block';

        // Header badge
        const friendlyName = d.bus_type + ' — ' + (d.bus_id || busId);
        document.getElementById('header-bus-name').textContent = friendlyName;
        document.getElementById('bus-display-name').textContent =
          (d.bus_type || 'Bus') + ' ' + (d.driver_name ? '('+d.driver_name+')' : '');

        // Status pill
        const statusPill = document.getElementById('status-pill');
        const status      = d.status || 'Offline';
        statusPill.textContent = status;
        statusPill.style.background =
          status === 'Active' ? '#2E7D32' :
          status === 'Full'   ? '#E65100' : '#9E9E9E';

        // Direction pill
        const dirPill = document.getElementById('direction-pill');
        const dir     = d.direction || '';
        if (dir === 'to_school') {
          dirPill.textContent       = '→ To School Park';
          dirPill.style.background  = '#1565C0';
        } else if (dir === 'to_gate') {
          dirPill.textContent       = '← To Gate Park';
          dirPill.style.background  = '#6A1B9A';
        } else {
          dirPill.textContent       = 'Direction not set';
          dirPill.style.background  = '#757575';
        }

        // Seat counter — live from Firestore
        const seats  = d.available_seats !== undefined ? d.available_seats : 0;
        const maxCap = d.max_capacity    !== undefined ? d.max_capacity    : 12;

        document.getElementById('seat-count').textContent    = seats;
        document.getElementById('seat-fraction').textContent =
          seats + ' / ' + maxCap + ' seats available';

        // Update button states based on live values
        document.getElementById('minus-btn').disabled = seats <= 0;
        document.getElementById('plus-btn').disabled  = seats >= maxCap;

        // Change seat number colour based on availability
        const seatEl = document.getElementById('seat-count');
        seatEl.style.color =
          seats === 0  ? '#C62828' :
          seats <= 3   ? '#E65100' : '#1B3A6B';

      }, function(err) {
        document.getElementById('loading-state').style.display = 'none';
        showError('Failed to load bus data: ' + err.message);
      });
  }

  // ════════════════════════════════════════════════════════════
  // SEAT INCREMENT / DECREMENT
  // Writes directly to Firestore — listener above updates UI
  // No need to manually update the number — onSnapshot handles it
  // ════════════════════════════════════════════════════════════
  function incrementSeat() {
    if (!currentBusData) return;
    const seats  = currentBusData.available_seats || 0;
    const maxCap = currentBusData.max_capacity    || 12;
    if (seats >= maxCap) return;

    db.collection('buses').doc(busId).update({
      available_seats: firebase.firestore.FieldValue.increment(1)
    }).catch(function(err) {
      alert('Failed to update: ' + err.message);
    });
  }

  function decrementSeat() {
    if (!currentBusData) return;
    const seats = currentBusData.available_seats || 0;
    if (seats <= 0) return;

    db.collection('buses').doc(busId).update({
      available_seats: firebase.firestore.FieldValue.increment(-1)
    }).catch(function(err) {
      alert('Failed to update: ' + err.message);
    });
  }

  // ════════════════════════════════════════════════════════════
  // CODE INPUT HANDLER
  // ════════════════════════════════════════════════════════════
  function onCodeInput(input) {
    // Force uppercase
    input.value = input.value.toUpperCase();
    // Enable verify button only when 4 chars entered
    document.getElementById('verify-btn').disabled = input.value.length < 4;
    // Clear result when typing new code
    hideResult();
  }

  // ════════════════════════════════════════════════════════════
  // VERIFY BOOKING CODE
  // Checks: booking_code + status=Booked + bus_document_id=thisbus
  // ════════════════════════════════════════════════════════════
  function verifyCode() {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length !== 4) return;

    const btn = document.getElementById('verify-btn');
    btn.disabled    = true;
    btn.textContent = '...';

    db.collection('reservations')
      .where('booking_code',    '==', code)
      .where('status',          '==', 'Booked')
      .where('bus_document_id', '==', busId)
      .get()
      .then(function(snap) {
        btn.disabled    = false;
        btn.textContent = 'Verify';

        if (snap.empty) {
          // Check if the code exists but for a different bus
          db.collection('reservations')
            .where('booking_code', '==', code)
            .where('status',       '==', 'Booked')
            .get()
            .then(function(allSnap) {
              if (!allSnap.empty) {
                showResult(false,
                  '❌ Wrong Bus',
                  'This code is valid but for a different bus. ' +
                  'Passenger should board the correct vehicle.'
                );
              } else {
                // Check if already used
                db.collection('reservations')
                  .where('booking_code', '==', code)
                  .get()
                  .then(function(anySnap) {
                    if (!anySnap.empty) {
                      var s = anySnap.docs[0].data().status;
                      showResult(false,
                        '⚠️ Already ' + s,
                        'This ticket was already ' + s.toLowerCase() +
                        '. It cannot be used again.'
                      );
                    } else {
                      showResult(false,
                        '❌ Invalid Code',
                        'Code "' + code + '" not found. ' +
                        'Check for typos and try again.'
                      );
                    }
                  });
              }
            });
          return;
        }

        // Found valid reservation — mark as Completed
        var resDoc = snap.docs[0];
        resDoc.ref.update({ status: 'Completed' })
          .then(function() {
            showResult(true,
              '✅ Access Granted',
              'Passenger may board. Seat confirmed and marked complete.'
            );
            // Clear input for next passenger
            document.getElementById('code-input').value = '';
            document.getElementById('verify-btn').disabled = true;
          })
          .catch(function(err) {
            showResult(false, '❌ Error', 'Could not mark ticket complete: ' + err.message);
          });
      })
      .catch(function(err) {
        btn.disabled    = false;
        btn.textContent = 'Verify';
        showResult(false, '❌ Error', err.message);
      });
  }

  // ════════════════════════════════════════════════════════════
  // RESULT DISPLAY HELPERS
  // ════════════════════════════════════════════════════════════
  function showResult(success, text, detail) {
    var box = document.getElementById('result-box');
    box.className = 'result-box ' + (success ? 'success' : 'error');
    document.getElementById('result-text').textContent   = text;
    document.getElementById('result-detail').textContent = detail || '';
    box.style.display = 'block';

    // Auto-hide success after 4 seconds
    if (success) {
      setTimeout(hideResult, 4000);
    }
  }

  function hideResult() {
    document.getElementById('result-box').style.display = 'none';
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML =
      '<div class="error-state">⚠️ ' + msg + '</div>';
    document.getElementById('main-content').style.display = 'block';
  }

  // ════════════════════════════════════════════════════════════
  // START
  // ════════════════════════════════════════════════════════════
  init();
  </script>
</body>
</html>
